<!DOCTYPE html>
<html lang="en" class="view-transition">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zack's Portfolio Website</title>
    <link rel="stylesheet" href="src/styles/main-styles.css">
    <link rel="stylesheet" href="src/styles/index-styles.css">
    <link rel="preload" href="src/assets/fonts/minecraftia.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <script src="src/scripts/theme-toggle.js" defer></script>
    <script src="src/scripts/view-transitions.js" defer></script>
    <script src="https://unpkg.com/skinview3d@3.2.0/bundles/skinview3d.bundle.js" defer></script>
    <script defer src="src/scripts/minecraft-skin.js?v=2"></script>
</head>
<body>
    <main>
        <section class="start-screen" aria-label="Portfolio start screen">
            <div class="title-wrap">
                <img class ="game-title" src="src/assets/imgs/original/zackroland.png" alt="Zack Roland">
                <p class="splash" aria-label="splash message">Soon to be graduating!</p>
            </div>

            <div class="play-area">
                <div class="menu-stack" aria-label="homepage options">
                    <a class="menu-btn" href="src/pages/projects.html">Projects</a>
                    <a class="menu-btn" href="src/pages/about.html">About Me</a>
                    <a class="menu-btn " href="src/pages/contact.html">Contact</a>
                    <a class="menu-btn" href="src/pages/blog.html">Blog</a>
                    <div class="menu-row">
                        <a class="menu-btn" href="src/pages/now.html">Now</a>
                        <a class="menu-btn" href="src/pages/projects-crud.html">Build Log</a>
                    </div>
                </div>

                <aside
                    class="skin-panel"
                    aria-label="Minecraft profile"
                    data-minecraft-ign="SozinsComet_"
                    data-minecraft-uuid="6970cb6524274b0c8b62b03317579c47"
                    data-minecraft-model="slim"
                >
                    <p class="panel-title">Player Model</p>
                    <img
                        id="minecraft-skin-image"
                        src=""
                        alt="Rendered Minecraft character model"
                        loading="lazy"
                    >
                    <canvas id="minecraft-skin-canvas" hidden aria-hidden="true"></canvas>
                    <p id="minecraft-ign" class="ign-label">Loading player...</p>
                    <p id="minecraft-skin-status" class="skin-status">Querying Mojang API...</p>
                </aside>
            </div>

            <p class="status-line">
                <small>Portfolio Beta 1.1</small>
                <small>&copy; 2025 Zack Roland</small>
            </p>
        </section>
    </main>

    <footer>
        <small id="copywright">&copy; 2025 Zack Roland</small>
    </footer>
</body>
</html>
